name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - goos: linux
            goarch: amd64
          - goos: linux
            goarch: arm64
          - goos: darwin
            goarch: amd64
          - goos: darwin
            goarch: arm64
          - goos: windows
            goarch: amd64
          - goos: windows
            goarch: arm64
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.22"
          cache-dependency-path: packages/aek-websearch/go.sum

      - name: Build
        working-directory: packages/aek-websearch
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: 0
        run: |
          BINARY=aek
          if [ "$GOOS" = "windows" ]; then
            BINARY=aek.exe
          fi
          go build -ldflags="-s -w -X main.version=${GITHUB_REF_NAME#v}" -o bin/${BINARY} ./cmd/aek/

      - name: Package
        run: |
          cd packages/aek-websearch/bin
          BINARY=aek
          if [ "${{ matrix.goos }}" = "windows" ]; then
            BINARY=aek.exe
          fi
          if [ "${{ matrix.goos }}" = "windows" ]; then
            zip aek-${{ matrix.goos }}-${{ matrix.goarch }}.zip ${BINARY}
          else
            tar -czf aek-${{ matrix.goos }}-${{ matrix.goarch }}.tar.gz ${BINARY}
          fi

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: aek-${{ matrix.goos }}-${{ matrix.goarch }}
          path: packages/aek-websearch/bin/aek-*

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download All Artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: false
          files: artifacts/**/*
