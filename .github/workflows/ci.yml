name: CI/CD Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  test:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        go-version: ['1.26.x']

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Go ${{ matrix.go-version }}
        uses: actions/setup-go@v5
        with:
          go-version: ${{ matrix.go-version }}

      - name: Build
        run: go build -v ./...
        working-directory: packages/aek-mcp

      - name: Vet
        run: go vet -v ./...
        working-directory: packages/aek-mcp

      - name: Unit Tests
        run: go test -v -count=1 -timeout 60s ./...
        working-directory: packages/aek-mcp

      - name: Integration Tests
        run: go test -v -tags=integration -count=1 -timeout 120s ./internal/handlers/
        working-directory: packages/aek-mcp
