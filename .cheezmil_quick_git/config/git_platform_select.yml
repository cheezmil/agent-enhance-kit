platforms:
  github:
    enabled: 1
    remote: github
    additionalGitignoreFile: '.cheezmil_quick_git/config/additional-github-gitignore.txt'
    pushRefspec: 'main_github:main'
    owner: cheezmil
    tokenFilePath: '"D:\MyNotes\pw\github\cheezmil\pw-pat-classic-cheezimil.txt"'
    remoteUrl: 'https://github.com/{owner}/{current_working_directory_name}'
    excludeFile: '.cheezmil_quick_git/config/exclude-github'
  gitea:
    enabled: 1
    remote: gitea
    additionalGitignoreFile: '.cheezmil_quick_git/config/additional-gitea-gitignore.txt'
    pushRefspec: 'main:main'
    owner: AlexanderDash
    tokenFilePath: 'D:\MyNotes\pw\gitea\pw_gitea.txt'
    remoteUrl: ''
    excludeFile: '.cheezmil_quick_git/config/exclude-gitea'
  gitee:
    enabled: 0
    remote: gitee
    additionalGitignoreFile: '.cheezmil_quick_git/config/additional-gitee-gitignore.txt'
    pushRefspec: ''
    owner: ''
    tokenFilePath: ''
    remoteUrl: ''
    excludeFile: '.cheezmil_quick_git/config/exclude-gitee'
  gitcode:
    enabled: 0
    remote: gitcode
    additionalGitignoreFile: '.cheezmil_quick_git/config/additional-gitcode-gitignore.txt'
    pushRefspec: ''
    owner: AlexanderDash
    tokenFilePath: 'D:\MyNotes\pw\gitcode\pw-t-AlexanderDash.txt'
    remoteUrl: ''
    excludeFile: '.cheezmil_quick_git/config/exclude-gitcode'
  atomgit:
    enabled: 0
    remote: atomgit
    additionalGitignoreFile: '.cheezmil_quick_git/config/additional-atomgit-gitignore.txt'
    pushRefspec: ''
    owner: ''
    tokenFilePath: ''
    remoteUrl: ''
    excludeFile: '.cheezmil_quick_git/config/exclude-atomgit'
settings:
  pushSequentially: 1
  continueOnError: 0
  showSummary: 1
  defaultAdditionalGitignoreFile: '.cheezmil_quick_git/config/additional-gitea-gitignore.txt'
  gitea_remote_protocol: http
  gitea_host: 127.0.0.1
  gitea_http_port: 3000
  gitea_ssh_port: 3001
  gitea_ssh_user: git
  custom_other_version_path: ''
  myOwnNames:
    - AlexanderDash
    - cheezmil
  defaultExcludeFile: '.cheezmil_quick_git/config/exclude-gitea'
  forceResetFiles:
    - '.cheezmil_quick_git/config/additional-gitea-gitignore.txt'
